server.port=${PORT:8080}
server.servlet.context-path=/api

# ── Database (set these as env vars on Railway) ──────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── CORS (set FRONTEND_URL to your Vercel domain) ────────────────────────────
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ── Email (Resend) ────────────────────────────────────────────────────────────
resend.api.key=${RESEND_API_KEY}
resend.from.address=${RESEND_FROM:onboarding@resend.dev}

app.otp.expiry-minutes=10

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.inventos=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null